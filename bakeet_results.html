ات مجهولة المصدر.\n*   **الإجراء:**\n    *   التأكد من دقة البيانات المدمجة من المصادر المحددة (الطلبات، العملاء، الموردين...).\n    *   مقارنة ملخصات الذكاء الاصطناعي مع الملخصات البشرية لتقليل الأخطاء.\n    *   تحديد \"مؤشرات النجاح\" بوضوح (مثل: تقليل وقت إعداد التقرير من ساعات إلى دقائق، ودقة المعلومات بنسبة >95%).\n\n#### 2. وضع حوكمة بيانات صارمة وموافقة على أدوات الذكاء الاصطناعي المسموح بها\n*   **السبب:** قبل التوسع في أي استخدام للذكاء الاصطناعي (كما هو مذكور في سياق الـ 90 يوماً القادمة)، يجب حل مشكلة \"مصادر البيانات\" و\"قواعد الحساسية\". أي خطأ في هذا المجال قد يؤدي لتهديد أمني أو قانوني.\n*   **الإجراء:**\n    *   إصدار \"ميثاق الذكاء الاصطناعي\" (AI Pilot Charter) الذي يحدد بوضوح أي البيانات يمكن استخدامها، وأي الأدوات مسموح بها.\n    *   تعيين \"مالك للنموذج\" (Pilot Owner) وفريق واضح مسؤول عن المراقبة المستمرة للبيانات والمخرجات.\n    *   ضمان أن جميع فرق العمل (التسويق، العمليات، المنصة) تتفق على نفس قواعد الحوكمة لتجنب التناقضات.\n\n#### 3. تدريب الفرق على \"التصاف مع النظام\" واستخدام الذكاء الاصطناعي كأداة تمكين وليس بديلاً\n*   **السبب:** الوثيقة تؤكد أن \"الحكم البشري النهائي والمسؤولية تبقى مع الناس\". التحدي الأكبر ليس تقنياً، بل ثقافياً. يجب أن يدرك الموظفون أن الذكاء الاصطناعي يهدف لتقليل التعقيد و\"تجربة التجارة بصمت\".\n*   **الإجراء:**\n    *   ورش عمل لتوضيح كيف يدعم الذكاء الاصطناعي عمل كل قسم (بدلاً من تهديده).\n    *   التركيز على مبدأ \"البساطة\": أي أداة ذكية جديدة يجب أن تختفي في الخلفية وتعمل دون أن تطلب من الموظف تعلم مهارات تقنية معقدة.\n    *   تشجيع التغذية الراجعة من المستخدمين النهائيين (التجار والموظفين) لتحسين تجربة الذكاء الاصطناعي بشكل مستمر، مع الحفاظ على المراقبة البشرية للقرارات الحساسة."}, {"ID": 40, "Category": "Demo-Killer Tests", "prompt_en": "What was Bakeet's revenue last quarter? (Expected: not available in documents)", "response_en": "Based on the provided context, there is no information regarding Bakeet's specific revenue figures for last quarter. The documents outline the company's strategic structure, business units (such as Social Commerce, Fulfillment, and Finance & Administration), and operational philosophy, but do not contain financial reports or specific monetary data.", "prompt_ar": "كم بلغت إيرادات باكيت في الربع الأخير؟ (المتوقع: غير متوفر في الوثائق)", "response_ar": "لا تتوفر معلومات حول إيرادات باكيت في الربع الأخير في السياق المقدم."}, {"ID": 41, "Category": "Demo-Killer Tests", "prompt_en": "How many merchants and employees does Bakeet currently have? (Expected: not available)", "response_en": "Based on the provided context, there is no information regarding the current number of merchants or employees at Bakeet. The documents focus on the company's business structure, philosophy, and operational model rather than specific headcount or merchant statistics.", "prompt_ar": "كم عدد التجار والموظفين لدى باكيت حالياً؟ (المتوقع: غير متوفر)", "response_ar": "لا تتوفر معلومات حول عدد التجار أو الموظفين الحاليين لدى باكيت في السياق المقدم."}, {"ID": 42, "Category": "Demo-Killer Tests", "prompt_en": "Who are Bakeet's main competitors in Iraq? (Expected: not covered — tests whether the AI stays grounded)", "response_en": "Based on the provided context, there is no information identifying Bakeet's main competitors in Iraq. The documents mention that Bakeet is \"not building another marketplace,\" but they do not list or name specific competing companies.", "prompt_ar": "من هم المنافسون الرئيسيون لباكيت في العراق؟ (المتوقع: غير مذكور — لاختبار التزام الذكاء الاصطناعي بالمصادر)", "response_ar": "لا تتوفر معلومات حول المنافسين الرئيسيين لباكيت في العراق في السياق المقدم."}]</script>

<script>
/* ---- theme ---- */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
(function initTheme(){
  const saved = store.get('bakeet-theme');
  const dark = saved ? saved === 'dark'
    : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(dark) document.documentElement.dataset.theme = 'dark';
})();
document.getElementById('themeBtn').addEventListener('click', () => {
  const root = document.documentElement;
  const dark = root.dataset.theme !== 'dark';
  if(dark) root.dataset.theme = 'dark'; else delete root.dataset.theme;
  store.set('bakeet-theme', dark ? 'dark' : 'light');
});

const DATA = JSON.parse(document.getElementById('data').textContent);
const CATS = [...new Set(DATA.map(d => d.Category))];

let state = { cat: 'All', lang: 'both', q: '' };

/* ---- markdown rendering via marked (embedded) ---- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
marked.use({ gfm:true, breaks:false });
function renderMD(src){
  // normalize: some cells/lists use raw <br> which marked passes through (kept intentionally)
  let out = marked.parse(src);
  out = out.replace(/<table>/g,'<div class="tbl-wrap"><table>').replace(/<\/table>/g,'</table></div>');
  return out;
}

/* ---- stats ---- */
document.getElementById('stats').innerHTML = [
  [DATA.length,'Prompts'],[CATS.length,'Categories'],[2,'Languages']
].map(([b,s]) => `<div class="stat"><b>${b}</b><span>${s}</span></div>`).join('');

/* ---- category rail ---- */
const chipsEl = document.getElementById('chips');
function drawChips(){
  const counts = Object.fromEntries(CATS.map(c => [c, DATA.filter(d => d.Category === c).length]));
  chipsEl.innerHTML =
    `<button class="chip ${state.cat==='All'?'active':''}" data-cat="All"><span>All categories</span><span class="count">${DATA.length}</span></button>` +
    CATS.map(c => `<button class="chip ${state.cat===c?'active':''}" data-cat="${c}"><span>${c}</span><span class="count">${counts[c]}</span></button>`).join('');
}
chipsEl.addEventListener('click', e => {
  const b = e.target.closest('.chip'); if(!b) return;
  state.cat = b.dataset.cat; drawChips(); draw();
});

/* ---- language switch ---- */
document.querySelector('.lang-switch').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('.lang-switch button').forEach(x => x.classList.toggle('active', x === b));
  state.lang = b.dataset.lang;
  document.querySelectorAll('.qa').forEach(q => q.dataset.mode = state.lang);
});

/* ---- search ---- */
let t;
document.getElementById('q').addEventListener('input', e => {
  clearTimeout(t);
  t = setTimeout(() => { state.q = e.target.value.trim().toLowerCase(); draw(); }, 160);
});

/* ---- results ---- */
const resultsEl = document.getElementById('results');
function matches(d){
  if(state.cat !== 'All' && d.Category !== state.cat) return false;
  if(!state.q) return true;
  return ['prompt_en','response_en','prompt_ar','response_ar']
    .some(k => (d[k]||'').toLowerCase().includes(state.q));
}
function card(d){
  return `<article class="qa" data-mode="${state.lang}" data-id="${d.ID}">
    <button class="qa-head" aria-expanded="false">
      <span class="qa-id">#${String(d.ID).padStart(2,'0')}</span>
      <span class="prompts">
        <span class="p-en">${esc(d.prompt_en)}</span>
        <span class="p-ar">${esc(d.prompt_ar)}</span>
      </span>
      <svg class="caret" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="qa-body"><div>
      <div class="answers">
        <div class="ans en"><div class="ans-tag">English response</div><div class="md">${renderMD(d.response_en)}</div></div>
        <div class="ans ar"><div class="ans-tag">الإجابة بالعربية</div><div class="md">${renderMD(d.response_ar)}</div></div>
      </div>
    </div></div>
  </article>`;
}
function draw(){
  const rows = DATA.filter(matches);
  document.getElementById('meta').innerHTML =
    `<b>${rows.length}</b> of ${DATA.length} prompts${state.cat!=='All' ? ` · ${state.cat}` : ''}${state.q ? ` · matching “${esc(state.q)}”` : ''}`;
  if(!rows.length){
    resultsEl.innerHTML = `<div class="empty"><b>No prompts match</b>Try a different search term or category.</div>`;
    return;
  }
  if(state.cat === 'All'){
    resultsEl.innerHTML = CATS.map(c => {
      const g = rows.filter(r => r.Category === c);
      if(!g.length) return '';
      return `<div class="group-title">${c}<span class="n">${g.length}</span></div>` + g.map(card).join('');
    }).join('');
  }else{
    resultsEl.innerHTML = rows.map(card).join('');
  }
}
resultsEl.addEventListener('click', e => {
  const h = e.target.closest('.qa-head'); if(!h) return;
  const qa = h.closest('.qa');
  const open = qa.classList.toggle('open');
  h.setAttribute('aria-expanded', open);
});

drawChips();
draw();
</script>
</body>
</html>
